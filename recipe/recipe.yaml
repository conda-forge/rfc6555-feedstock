schema_version: 1

context:
  name: rfc6555
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/rfc6555-${{ version }}.tar.gz
  sha256: 123905b8f68e2bec0c15f321998a262b27e2eaadea29a28bd270021ada411b67

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - rfc6555
      pip_check: true
      python_version: ${{ python_min }}

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Python implementation of the Happy Eyeballs Algorithm described in RFC 6555
  description: |
    Python implementation of the Happy Eyeballs Algorithm described
    in RFC 6555. Provided with a single file and dead-simple API to
    allow easy vendoring and integration into other projects.
  homepage: https://www.github.com/SethMichaelLarson/rfc6555
  repository: https://www.github.com/SethMichaelLarson/rfc6555
  documentation: https://www.github.com/SethMichaelLarson/rfc6555

extra:
  recipe-maintainers:
    - jan-janssen
